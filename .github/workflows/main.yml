name: Build Mac App

on:
  push:
    branches: [ main ]

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pyinstaller requests

      - name: Build
        run: pyinstaller --onefile --windowed --name "CapCut Translator" app.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: CapCut-Translator-Mac
          path: dist/
